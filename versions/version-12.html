<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Studio Brachio Island - Version 12</title>
    <link rel="stylesheet" href="version-12.css?v=20260704-18">
  </head>
  <body>
    <header>
      <a href="../index.html">Studio Brachio Island</a>
      <div class="language-switch" aria-label="Language">
        <button type="button" data-language="en">EN</button>
        <span>/</span>
        <button type="button" data-language="ko">KO</button>
      </div>
    </header>

    <section class="intro-screen" aria-label="Studio intro">
      <div class="intro-card">
        <img class="intro-mark" src="../resource/title.png" alt="Studio Brachio Island">
      </div>
    </section>

    <main>
      <section class="hero role-hero">
        <div class="role-panels" aria-label="Brachio Island Studio roles">
          <article class="role-panel" data-role-panel="identity"></article>
          <article class="role-panel" data-role-panel="engineer"></article>
          <article class="role-panel" data-role-panel="novel"></article>
          <article class="role-panel" data-role-panel="visual"></article>
          <article class="role-panel" data-role-panel="aesthetics"></article>
        </div>
      </section>

    </main>

    <div id="reader-modal" class="reader-modal" aria-hidden="true">
      <div class="reader-backdrop" data-close-reader></div>
      <section class="reader-window" role="dialog" aria-modal="true" aria-labelledby="reader-title">
        <div class="reader-toolbar">
          <div>
            <p class="reader-kicker">Read</p>
            <h2 id="reader-title">글을 선택하세요</h2>
          </div>
          <div class="reader-actions">
            <label>
              lang
              <select id="reader-lang" aria-label="언어">
                <option value="en" selected>en</option>
                <option value="ko">ko</option>
              </select>
            </label>
            <label>
              size
              <select id="reader-size" aria-label="글씨 크기">
                <option value="small">small</option>
                <option value="medium" selected>medium</option>
                <option value="large">large</option>
              </select>
            </label>
            <label>
              spacing
              <select id="reader-spacing" aria-label="줄간격">
                <option value="tight">tight</option>
                <option value="normal" selected>normal</option>
                <option value="wide">wide</option>
              </select>
            </label>
            <label>
              theme
              <select id="reader-theme" aria-label="읽기 테마">
                <option value="light" selected>white</option>
                <option value="dark">night</option>
              </select>
            </label>
            <a id="reader-source" class="modal-source" href="#" hidden></a>
            <button class="modal-close" type="button" data-close-reader aria-label="Close reader">×</button>
          </div>
        </div>
        <article id="reader-content" class="reader-content">
          <p>writing 섹션에서 제목을 클릭하면 이곳에 본문이 렌더링됩니다.</p>
        </article>
      </section>
    </div>

    <div id="pdf-modal" class="pdf-modal" aria-hidden="true">
      <div class="pdf-backdrop" data-close-pdf></div>
      <section class="pdf-window" role="dialog" aria-modal="true" aria-labelledby="pdf-title">
        <div class="pdf-toolbar">
          <div>
            <p class="reader-kicker">PDF</p>
            <h2 id="pdf-title">PDF를 선택하세요</h2>
          </div>
          <div class="reader-actions">
            <a id="pdf-source" class="modal-source" href="#" hidden></a>
            <button class="modal-close" type="button" data-close-pdf aria-label="Close PDF">×</button>
          </div>
        </div>
        <iframe id="pdf-frame" class="pdf-frame" title="PDF viewer"></iframe>
      </section>
    </div>

    <script src="writing-data.js"></script>
    <script src="../content-index.js"></script>
    <script src="version-12.js?v=20260704-18"></script>
  </body>
</html>
